<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="areaResult">
            <span>...</span>
        </div>
        <div class="area-numeros">
            <div class="teclado-linha">
                <div class="tecla cinza" data-key="--">--</div>
                <div class="tecla cinza limpar">C</div>
                <div class="tecla cinza" data-key="%">%</div>
                <div class="tecla orange divisao">/</div>
            </div>
            <div class="teclado-linha">
                <div class="tecla numero" data-key='7'>7</div>
                <div class="tecla numero" data-key="8">8</div>
                <div class="tecla numero" data-key="9">9</div>
                <div class="tecla orange multiplicacao">x</div>
            </div>
            <div class="teclado-linha">
                <div class="tecla numero" data-key="4">4</div>
                <div class="tecla numero" data-key="5">5</div>
                <div class="tecla numero" data-key="6">6</div>
                <div class="tecla orange subtrair">-</div>
            </div>
            <div class="teclado-linha">
                <div class="tecla numero" data-key="1">1</div>
                <div class="tecla numero" data-key="2">2</div>
                <div class="tecla numero" data-key="3">3</div>
                <div class="tecla orange soma">+</div>
            </div>
            <div class="teclado-linha">
                <div class="tecla" >+/-</div>
                <div class="tecla numero" data-key="0">0</div>
                <div class="tecla">,</div>
                <div class="tecla orange igual">=</div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
